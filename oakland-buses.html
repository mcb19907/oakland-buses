<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Oakland Bus Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
  <link rel="apple-touch-icon" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oakland Buses">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-hover: #222633;
      --accent: #4f8cff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --text: #e8eaed;
      --muted: #8b8fa3;
      --border: #2a2e3d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, #1a1d27 0%, #1e2235 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      backdrop-filter: blur(10px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo span {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-top: 1px;
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .refresh-btn:active { background: var(--card-hover); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .filter-chip:active { transform: scale(0.95); }

    .last-updated {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 10px 20px 4px;
    }

    .bus-list { padding: 8px 16px 24px; }

    .bus-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .bus-card:active { background: var(--card-hover); transform: scale(0.99); }
    .bus-card.priority { border-color: rgba(79, 140, 255, 0.3); }

    .bus-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .bus-route-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .route-badge {
      min-width: 48px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }

    .route-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }

    .route-dest {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .arrivals {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .arrival-pill {
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      min-width: 42px;
    }

    .arrival-now {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .arrival-soon {
      background: rgba(251, 191, 36, 0.15);
      color: var(--yellow);
    }

    .arrival-later {
      background: rgba(79, 140, 255, 0.1);
      color: var(--accent);
    }

    .bus-card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .stop-name {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stop-name svg { flex-shrink: 0; }

    .occupancy {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .occ-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .occ-low { background: var(--green); }
    .occ-med { background: var(--yellow); }
    .occ-high { background: var(--red); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state p { font-size: 15px; margin-top: 12px; }

    .detail-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      align-items: flex-end;
      justify-content: center;
    }

    .detail-modal.open { display: flex; }

    .detail-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 8px 20px 32px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 8px auto 16px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .detail-title h2 { font-size: 18px; }
    .detail-title p { font-size: 13px; color: var(--muted); }

    .stop-list { list-style: none; }

    .stop-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      position: relative;
    }

    .stop-dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 16px;
      flex-shrink: 0;
    }

    .stop-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--bg);
      z-index: 1;
    }

    .stop-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px rgba(79, 140, 255, 0.5);
    }

    .stop-line {
      width: 2px;
      flex: 1;
      background: var(--border);
      min-height: 20px;
    }

    .stop-info h4 { font-size: 14px; font-weight: 500; }
    .stop-info p { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .flip-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 14px;
      margin-bottom: 16px;
      background: rgba(79, 140, 255, 0.1);
      border: 1px solid rgba(79, 140, 255, 0.25);
      border-radius: 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .flip-btn:active { background: rgba(79, 140, 255, 0.2); transform: scale(0.98); }
    .flip-btn svg { flex-shrink: 0; }
    .flip-btn.loading { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
          <rect x="3" y="6" width="18" height="12" rx="2"/>
          <circle cx="7" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/>

        <h1>Oakland Buses</h1>

        <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.64-12.36L3 9"/>

    </button>

  <div class="filter-row">
    <button class="filter-chip active" data-filter="mine">My Buses</button>
    <button class="filter-chip" data-filter="nearby">Near Me</button>
    <button class="filter-chip" data-filter="all">All</button>
    <button class="filter-chip" data-filter="local">Local</button>
    <button class="filter-chip" data-filter="transbay">Transbay</button>
    <button class="filter-chip" data-filter="night">Late Night</button>
  </div>
</header>

<div class="last-updated" id="lastUpdated"></div>
<div class="bus-list" id="busList"></div>

<div class="detail-modal" id="detailModal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-sheet">
    <div class="sheet-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<script>

const ROUTES = [

  },

  },
  {

    destination: 'MacArthur Blvd',
    headsign: 'MacArthur BART to Laurel District',
    nearStop: 'MacArthur Blvd & High St',
    stops: ['MacArthur BART','MacArthur & High St','MacArthur & Seminary','Laurel District','Mills College']
  }
];

const API_TOKEN = '1D822695AF23FDEE3E27067B72F5DCFF';
const MY_STOPS = ['55443', '58500', '55088'];
const STOP_COORDS = {
  '55443': { lat: 37.804607, lon: -122.229771 },
  '58500': { lat: 37.806100, lon: -122.232300 },
  '55088': { lat: 37.805800, lon: -122.233100 }
};
const occupancyLabels = { EMPTY: 'Empty', HALF_EMPTY: 'Some seats', FULL: 'Standing room', '': 'Unknown' };
const occupancyClass = { EMPTY: 'low', HALF_EMPTY: 'med', FULL: 'high', '': 'med' };

let arrivals = {};
let activeFilter = 'mine';
let loading = true;

async function fetchArrivals() {
  const allPredictions = [];
  for (const stopId of MY_STOPS) {
    try {
      const res = await fetch(
        `https://api.actransit.org/transit/actrealtime/prediction?stpid=${stopId}&token=${API_TOKEN}`
      );
      const data = await res.json();
      const preds = data['bustime-response']?.prd || [];
      allPredictions.push(...preds);
    } catch (e) {
      console.error(`Failed to fetch stop ${stopId}:`, e);
    }
  }

  // Group predictions by route
  const grouped = {};
  allPredictions.forEach(p => {
    const rt = p.rt;
    if (!grouped[rt]) grouped[rt] = [];
    grouped[rt].push({
      minutes: p.prdctdn === 'DUE' ? 0 : parseInt(p.prdctdn),
      destination: p.des,
      direction: p.rtdir,
      stopName: p.stpnm,
      stopId: p.stpid,
      vehicleId: p.vid,
      delayed: p.dly,
      load: p.psgld || '',
      scheduled: p.schdtm,
      predicted: p.prdtm
    });
  });

  // Build arrivals keyed by route id
  const newArrivals = {};
  Object.entries(grouped).forEach(([rt, preds]) => {
    preds.sort((a, b) => a.minutes - b.minutes);
    newArrivals[rt] = {
      times: preds.map(p => p.minutes),
      occupancy: preds[0]?.load || '',
      direction: preds[0]?.direction || '',
      destination: preds[0]?.destination || '',
      stopName: preds[0]?.stopName || '',
      stopId: preds[0]?.stopId || '',
      predictions: preds
    };
  });

  arrivals = newArrivals;
  loading = false;
}

// ── NEAR ME ──
let nearbyArrivals = {};
let nearbyLoading = false;
let nearbyError = '';
const ROUTE_COLORS = {
  'V':'#8b5cf6','18':'#f59e0b','688':'#06b6d4','NL':'#6366f1','NX':'#f43f5e',
  '57':'#10b981','1':'#3b82f6','1R':'#ef4444','6':'#06b6d4','12':'#06b6d4',
  '33':'#ec4899','51A':'#d946ef','72':'#14b8a6','72R':'#ef4444','51B':'#d946ef',
  'NX1':'#d946ef','NX2':'#d946ef','NX3':'#d946ef','NXC':'#d946ef'
};

function getRouteColor(rt) {
  return ROUTE_COLORS[rt] || '#' + ((parseInt(rt, 36) * 123456) % 0xFFFFFF).toString(16).padStart(6, '0');
}

async function fetchNearby() {
  nearbyLoading = true;
  nearbyError = '';
  nearbyArrivals = {};
  renderBuses();

  let lat, lon;
  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 })
    );
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
  } catch (e) {
    nearbyLoading = false;
    nearbyError = e.code === 1 ? 'Location access denied — check your browser settings' : 'Could not get your location';
    renderBuses();
    return;
  }

  try {
    // Get nearby stops within quarter mile (1320 ft)
    const stopsRes = await fetch(
      `https://api.actransit.org/transit/stops/${lat}/${lon}/1320?token=${API_TOKEN}`
    );
    const stops = await stopsRes.json();

    if (!stops.length) {
      nearbyLoading = false;
      nearbyError = 'No AC Transit stops within a quarter mile';
      renderBuses();
      return;
    }

    // Fetch predictions for each nearby stop (max 8 to keep it fast)
    const allPreds = [];
    const stopDistances = {};
    for (const stop of stops.slice(0, 8)) {
      // Calculate rough distance in feet for display
      const dLat = (stop.Latitude - lat) * 364000;
      const dLon = (stop.Longitude - lon) * 288200;
      const distFt = Math.round(Math.sqrt(dLat * dLat + dLon * dLon));
      stopDistances[stop.StopId] = distFt;

      try {
        const res = await fetch(
          `https://api.actransit.org/transit/actrealtime/prediction?stpid=${stop.StopId}&token=${API_TOKEN}`
        );
        const data = await res.json();
        const preds = data['bustime-response']?.prd || [];
        allPreds.push(...preds);
      } catch (e) { /* skip failed stops */ }
    }

    // Group by route
    const grouped = {};
    allPreds.forEach(p => {
      const rt = p.rt;
      if (!grouped[rt]) grouped[rt] = [];
      grouped[rt].push({
        minutes: p.prdctdn === 'DUE' ? 0 : parseInt(p.prdctdn),
        destination: p.des,
        direction: p.rtdir,
        stopName: p.stpnm,
        stopId: p.stpid,
        vehicleId: p.vid,
        delayed: p.dly,
        load: p.psgld || '',
        distFt: stopDistances[parseInt(p.stpid)] || 0
      });
    });

    const result = {};
    Object.entries(grouped).forEach(([rt, preds]) => {
      preds.sort((a, b) => a.minutes - b.minutes);
      result[rt] = {
        times: preds.map(p => p.minutes),
        occupancy: preds[0]?.load || '',
        direction: preds[0]?.direction || '',
        stopName: preds[0]?.stopName || '',
        distFt: preds[0]?.distFt || 0,
        predictions: preds
      };
    });

    nearbyArrivals = result;
  } catch (e) {
    nearbyError = 'Failed to load nearby buses';
  }

  nearbyLoading = false;
  renderBuses();
}

function arrivalPill(min) {
  if (min <= 1) return `<span class="arrival-pill arrival-now">NOW</span>`;
  if (min <= 5) return `<span class="arrival-pill arrival-soon">${min}m</span>`;
  return `<span class="arrival-pill arrival-later">${min}m</span>`;
}

function renderBuses() {
  const list = document.getElementById('busList');

  if (activeFilter === 'nearby') {
    if (nearbyLoading) {
      list.innerHTML = `<div class="empty-state"><p>📍 Finding nearby buses...</p></div>`;
      return;
    }
    if (nearbyError) {
      list.innerHTML = `<div class="empty-state"><p>${nearbyError}</p></div>`;
      return;
    }
    const routes = Object.keys(nearbyArrivals);
    if (!routes.length) {
      list.innerHTML = `<div class="empty-state"><p>No nearby buses right now</p></div>`;
      return;
    }
    // Sort by soonest arrival
    routes.sort((a, b) => nearbyArrivals[a].times[0] - nearbyArrivals[b].times[0]);
    list.innerHTML = routes.map(rt => {
      const a = nearbyArrivals[rt];
      const occ = a.occupancy;
      const occClass = occupancyClass[occ] || 'med';
      const occLabel = occupancyLabels[occ] || 'Unknown';
      const distLabel = a.distFt < 528 ? `${Math.round(a.distFt)}ft` : `${(a.distFt / 5280).toFixed(1)}mi`;
      return `
        <div class="bus-card" onclick="showNearbyDetail('${rt}')"
          <div class="bus-card-top">
            <div class="bus-route-info">
              <div class="route-badge" style="background:${getRouteColor(rt)}">${rt}</div>
              <div>
                <div class="route-name">${a.direction}</div>
                <div class="route-dest">${a.stopName}</div>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="arrivals">
              ${a.times.slice(0, 3).map(t => arrivalPill(t)).join('')}
            </div>
          </div>
          <div class="bus-card-bottom">
            <div class="stop-name">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              ${distLabel} away
            </div>
            <div class="occupancy">
              <span class="occ-dot occ-${occClass}"></span>
              ${occLabel}
            </div>
          </div>
        </div>`;
    }).join('');
    document.getElementById('lastUpdated').textContent =
      `Updated ${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
    return;
  }

  if (loading) {
    list.innerHTML = `<div class="empty-state"><p>Loading real-time arrivals...</p></div>`;
    return;
  }

  let filtered;
  if (activeFilter === 'mine') {
    filtered = ROUTES.filter(r => MY_BUSES.includes(r.id));
  } else if (activeFilter === 'all') {
    filtered = ROUTES;
  } else {
    filtered = ROUTES.filter(r => r.type === activeFilter);
  }

  // Only show routes that have live predictions (for My Buses), keep all for other filters
  const withData = filtered.map(route => {
    const a = arrivals[route.id];
    return { route, a };
  });

  if (!withData.length) {
    list.innerHTML = `<div class="empty-state"><p>No buses match this filter</p></div>`;
    return;
  }

  list.innerHTML = withData.map(({ route, a }) => {
    if (!a || !a.times.length) {
      return `
        <div class="bus-card${route.priority ? ' priority' : ''}">
          <div class="bus-card-top">
            <div class="bus-route-info">
              <div class="route-badge" style="background:${route.color}">${route.name}</div>
              <div>
                <div class="route-name">${route.priority ? '&#9733; ' : ''}${route.destination}</div>
                <div class="route-dest">No buses predicted right now</div>
              </div>
            </div>
          </div>
        </div>`;
    }
    const occ = a.occupancy;
    const occClass = occupancyClass[occ] || 'med';
    const occLabel = occupancyLabels[occ] || 'Unknown';
    const liveDir = a.direction || route.headsign;
    const liveStop = a.stopName || route.nearStop;
    return `
      <div class="bus-card${route.priority ? ' priority' : ''}" onclick="showDetail('${route.id}')">
        <div class="bus-card-top">
          <div class="bus-route-info">
            <div class="route-badge" style="background:${route.color}">${route.name}</div>
            <div>
              <div class="route-name">${route.priority ? '&#9733; ' : ''}${route.destination}</div>
              <div class="route-dest">${liveDir}</div>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="arrivals">
            ${a.times.slice(0, 3).map(t => arrivalPill(t)).join('')}
          </div>
        </div>
        <div class="bus-card-bottom">
          <div class="stop-name">
            <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            ${liveStop}
          </div>
          <div class="occupancy">
            <span class="occ-dot occ-${occClass}"></span>
            ${occLabel}
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('lastUpdated').textContent =
    `Updated ${new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}`;
}

function renderDetailContent(routeId, routeColor, routeName, direction, stopName, stopId, predictions) {
  const flipIcon = `<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>`;
  const times = predictions.map(p => p.minutes);

  return `
    <div class="detail-header">
      <div class="route-badge" style="background:${routeColor};width:52px;height:44px;font-size:19px">${routeName}</div>
      <div class="detail-title">
        <h2>${routeName}</h2>
        <p>${direction}</p>
      </div>
    </div>
    <button class="flip-btn" id="flipBtn" onclick="flipDirection('${routeId}', '${stopId}')">
      ${flipIcon}
      <span>Show other direction</span>
    </button>
    <p style="font-size:13px;color:var(--muted);margin-bottom:4px">Next arrivals at ${stopName}</p>
    <div class="arrivals" style="margin-bottom:20px">
      ${times.slice(0, 3).map(t => arrivalPill(t)).join('')}
    </div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Upcoming buses</p>
    <ul class="stop-list">
      ${predictions.map((p, i) => {
        const load = occupancyLabels[p.load] || '';
        const delayed = p.delayed ? ' (delayed)' : '';
        return `
        <li class="stop-item">
          <div class="stop-dot-col">
            <div class="stop-dot ${i === 0 ? 'active' : ''}"></div>
            ${i < predictions.length - 1 ? '<div class="stop-line"></div>' : ''}
          </div>
          <div class="stop-info">
            <h4>${p.minutes === 0 ? 'DUE NOW' : p.minutes + ' min'}${delayed}</h4>
            <p>Vehicle #${p.vehicleId}${load ? ' · ' + load : ''}</p>
          </div>
        </li>`;
      }).join('')}
    </ul>`;
}

function showDetail(id) {
  const route = ROUTES.find(r => r.id === id);
  const a = arrivals[id];
  if (!a) return;

  document.getElementById('detailContent').innerHTML = renderDetailContent(
    id, route.color, route.name,
    a.direction || route.headsign,
    a.stopName, a.stopId,
    a.predictions
  );
  document.getElementById('detailModal').classList.add('open');
}

function showNearbyDetail(rt) {
  const a = nearbyArrivals[rt];
  if (!a) return;
  const color = getRouteColor(rt);
  const stopId = a.predictions[0]?.stopId || '';

  document.getElementById('detailContent').innerHTML = renderDetailContent(
    rt, color, rt,
    a.direction,
    a.stopName, stopId,
    a.predictions
  );
  document.getElementById('detailModal').classList.add('open');
}

async function flipDirection(routeId, currentStopId) {
  const btn = document.getElementById('flipBtn');
  btn.classList.add('loading');
  btn.querySelector('span').textContent = 'Finding other direction...';

  // Get coordinates for the current stop
  let lat, lon;
  const known = STOP_COORDS[currentStopId];
  if (known) {
    lat = known.lat;
    lon = known.lon;
  } else {
    // Look up stop coords from API
    try {
      const res = await fetch(`https://api.actransit.org/transit/stops/${currentStopId}?token=${API_TOKEN}`);
      const stop = await res.json();
      lat = stop.Latitude;
      lon = stop.Longitude;
    } catch (e) {
      btn.classList.remove('loading');
      btn.querySelector('span').textContent = 'Could not find other direction';
      return;
    }
  }

  try {
    // Find nearby stops for this route (1500ft to catch the opposite side)
    const stopsRes = await fetch(
      `https://api.actransit.org/transit/stops/${lat}/${lon}/1500?token=${API_TOKEN}`
    );
    const nearbyStops = await stopsRes.json();

    // Try each nearby stop (excluding current) for predictions on this route in the other direction
    let flippedPreds = null;
    let flippedStop = null;

    for (const stop of nearbyStops) {
      if (String(stop.StopId) === String(currentStopId)) continue;

      try {
        const predRes = await fetch(
          `https://api.actransit.org/transit/actrealtime/prediction?stpid=${stop.StopId}&rt=${routeId}&token=${API_TOKEN}`
        );
        const predData = await predRes.json();
        const preds = predData['bustime-response']?.prd || [];

        if (preds.length > 0) {
          // Check if this is a different direction than what we currently show
          const currentDir = arrivals[routeId]?.direction || '';
          const newDir = preds[0].rtdir || '';
          if (newDir !== currentDir || !currentDir) {
            flippedPreds = preds;
            flippedStop = stop;
            break;
          }
        }
      } catch (e) { /* try next stop */ }
    }

    if (!flippedPreds) {
      btn.classList.remove('loading');
      btn.querySelector('span').textContent = 'No buses in other direction right now';
      setTimeout(() => {
        btn.querySelector('span').textContent = 'Show other direction';
        btn.classList.remove('loading');
      }, 3000);
      return;
    }

    // Build predictions array
    const predictions = flippedPreds.map(p => ({
      minutes: p.prdctdn === 'DUE' ? 0 : parseInt(p.prdctdn),
      destination: p.des,
      direction: p.rtdir,
      stopName: p.stpnm,
      stopId: String(flippedStop.StopId),
      vehicleId: p.vid,
      delayed: p.dly,
      load: p.psgld || ''
    }));
    predictions.sort((a, b) => a.minutes - b.minutes);

    const route = ROUTES.find(r => r.id === routeId);
    const color = route ? route.color : getRouteColor(routeId);

    document.getElementById('detailContent').innerHTML = renderDetailContent(
      routeId, color, routeId,
      predictions[0].direction,
      predictions[0].stopName,
      predictions[0].stopId,
      predictions
    );

  } catch (e) {
    btn.classList.remove('loading');
    btn.querySelector('span').textContent = 'Error loading other direction';
  }
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

async function refreshData() {
  const btn = document.querySelector('.refresh-btn');
  btn.classList.add('spinning');
  if (activeFilter === 'nearby') {
    await fetchNearby();
  } else {
    await fetchArrivals();
    renderBuses();
  }
  btn.classList.remove('spinning');
}

// Filters
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    if (activeFilter === 'nearby') {
      fetchNearby();
    } else {
      renderBuses();
    }
  });
});

// Auto-refresh every 30s
setInterval(async () => {
  if (activeFilter === 'nearby') {
    await fetchNearby();
  } else {
    await fetchArrivals();
    renderBuses();
  }
}, 30000);

// Refresh when switching back to the tab
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    if (activeFilter === 'nearby') {
      await fetchNearby();
    } else {
      await fetchArrivals();
      renderBuses();
    }
  }
});

// Initial load
fetchArrivals().then(() => renderBuses());
</script>
</body>
</html>
